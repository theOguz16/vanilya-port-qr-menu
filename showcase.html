<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vanilya Port QR Menü</title>
    <meta
      name="description"
      content="Vanilya Port için kategori kartlı mobil QR menü."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./showcase.css?v=20260703-dynamic-categories" />
  </head>
  <body>
    <main class="showcase-app" data-view="categories">
      <div class="showcase-decor" aria-hidden="true">
        <img class="decor-palm" src="./assets/beach-palm.svg" alt="" />
        <img class="decor-umbrella" src="./assets/beach-umbrella.svg" alt="" />
        <img class="decor-lounger" src="./assets/beach-lounger.svg" alt="" />
        <img class="decor-waves" src="./assets/beach-waves.svg" alt="" />
      </div>

      <section class="showcase-landing" id="categoryView" aria-labelledby="landingTitle">
        <header class="showcase-hero">
          <img class="showcase-logo" src="./assets/vanilya-port-logo.jpg" alt="Vanilya Port logosu" />
          <p>FOOD & DRINK</p>
          <h1 id="landingTitle">VANİLYA PORT</h1>
          <span>Yazlık, sakin ve butik bir kafe deneyimi.</span>
        </header>

        <section class="category-grid" id="categoryGrid" aria-label="Kategoriler"></section>

        <footer class="landing-footer">
          <small>by <strong>Oğuz Han Uyar</strong> <span>© 2026</span></small>
        </footer>
      </section>

      <section class="showcase-menu" id="menuView" aria-labelledby="menuTitle" hidden>
        <header class="menu-topbar">
          <button class="back-button" type="button" id="backToCategories" aria-label="Kategorilere dön">
            ‹
          </button>
          <div>
            <p>VANİLYA PORT</p>
            <h1 id="menuTitle">Menü</h1>
          </div>
          <img src="./assets/vanilya-port-logo.jpg" alt="" aria-hidden="true" />
        </header>

        <section class="menu-filter-shell" aria-label="Kategori filtreleri">
          <div class="filter-head">
            <strong>Kategoriler</strong>
            <button class="see-all-button" type="button" id="seeAllButton">Tümünü Gör</button>
          </div>
          <div class="category-rail" id="categoryRail"></div>
        </section>

        <section class="product-sections" id="productSections"></section>

        <footer class="showcase-footer">
          <p>Fiyatlarımıza KDV dahildir. Ürün görselleri temsilidir.</p>
          <small>by <strong>Oğuz Han Uyar</strong> <span>© 2026</span></small>
        </footer>
      </section>

      <div class="showcase-sheet" id="productSheetAlt" aria-hidden="true">
        <button class="sheet-dim" type="button" id="closeSheetAlt" aria-label="Kapat"></button>
        <article class="alt-sheet-card" role="dialog" aria-modal="true" aria-labelledby="altSheetTitle">
          <button class="sheet-close-button" type="button" data-close-sheet aria-label="Kapat">×</button>
          <img id="altSheetImage" alt="" />
          <div class="alt-sheet-content">
            <span id="altSheetCategory"></span>
            <h2 id="altSheetTitle"></h2>
            <p id="altSheetDescription"></p>
            <div class="alt-sheet-options" id="altSheetOptions" hidden></div>
            <footer>
              <strong id="altSheetPrice"></strong>
              <small id="altSheetCalories"></small>
            </footer>
          </div>
        </article>
      </div>
    </main>

    <script src="./menu-data.js?v=20260705-sufle-real-photo"></script>
    <script src="./showcase.js?v=20260703-food-title-image"></script>
  </body>
</html>
